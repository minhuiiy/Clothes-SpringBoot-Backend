spring.application.name=clothes-backend

# Datasource configuration
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:clothes_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SQL Initialization / Seeds
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Server port
server.port=8080

# JWT configuration
clothes.app.jwtSecret=${JWT_SECRET:ThisIsASecretKeyForJwtAuthenticationWhichMustBeAtLeast256BitsLong}
clothes.app.jwtExpirationMs=${JWT_EXPIRATION:86400000}

# Mail configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:default@example.com}
spring.mail.password=${MAIL_PASSWORD:defaultPassword}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Swagger/OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Jackson
spring.jackson.serialization.fail-on-empty-beans=false

# Payment configurations
stripe.api.key=${STRIPE_API_KEY:default_stripe_key}
vnpay.tmn.code=${VNPAY_TMN_CODE:default_vnpay_code}
vnpay.hash.secret=${VNPAY_HASH_SECRET:default_vnpay_secret}
vnpay.url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.return.url=http://localhost:4205/checkout/callback

# Telegram Bot configurations
telegram.bot.token=${TELEGRAM_BOT_TOKEN:8739895280:AAEIENNmGFQGKB_nSWq6db9EnPltMinoUV8}
telegram.bot.chat-id=${TELEGRAM_CHAT_ID:1026838131}
telegram.bot.enabled=${TELEGRAM_BOT_ENABLED:true}
